name: Add to Project (Reusable)

on:
  workflow_call:
    inputs:
      id-prefix:
        description: 'Repository issue/PR prefix (e.g. DOCS, RANGER, AVD)'
        type: string
        required: true
      solution-option-id:
        description: 'Project board Solution field option ID for this repo'
        type: string
        required: true
    secrets:
      AZL_APP_ID:
        required: true
      AZL_APP_PRIVATE_KEY:
        required: true

jobs:
  add-and-configure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.AZL_APP_ID }}
          private-key: ${{ secrets.AZL_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Add to project
        uses: actions/add-to-project@v1.0.2
        id: add
        with:
          project-url: https://github.com/orgs/AzureLocal/projects/3
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Export token and item ID for field steps
        if: github.event_name == 'issues' && steps.add.outputs.itemId != ''
        run: |
          echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"
          echo "ITEM_ID=${{ steps.add.outputs.itemId }}" >> "$GITHUB_ENV"

      - name: Set ID field
        if: github.event_name == 'issues' && steps.add.outputs.itemId != ''
        env:
          PROJECT_ID: "PVT_kwDOCxeiOM4BR2KZ"
          ID_FIELD: "PVTF_lADOCxeiOM4BR2KZzhADImQ"
        run: |
          gh project item-edit --project-id "$PROJECT_ID" --id "$ITEM_ID" \
            --field-id "$ID_FIELD" --text "${{ inputs.id-prefix }}-${{ github.event.issue.number }}"

      - name: Set Status to Todo
        if: github.event_name == 'issues' && steps.add.outputs.itemId != ''
        env:
          PROJECT_ID: "PVT_kwDOCxeiOM4BR2KZ"
          STATUS_FIELD: "PVTSSF_lADOCxeiOM4BR2KZzg_jXr8"
        run: |
          gh project item-edit --project-id "$PROJECT_ID" --id "$ITEM_ID" \
            --field-id "$STATUS_FIELD" --single-select-option-id "f75ad846"

      - name: Set Solution field
        if: github.event_name == 'issues' && steps.add.outputs.itemId != ''
        env:
          PROJECT_ID: "PVT_kwDOCxeiOM4BR2KZ"
          SOLUTION_FIELD: "PVTSSF_lADOCxeiOM4BR2KZzg_jXuY"
        run: |
          gh project item-edit --project-id "$PROJECT_ID" --id "$ITEM_ID" \
            --field-id "$SOLUTION_FIELD" --single-select-option-id "${{ inputs.solution-option-id }}"

      - name: Set Priority field
        if: github.event_name == 'issues' && steps.add.outputs.itemId != ''
        env:
          PROJECT_ID: "PVT_kwDOCxeiOM4BR2KZ"
          PRIORITY_FIELD: "PVTSSF_lADOCxeiOM4BR2KZzg_jXvs"
        run: |
          LABELS='${{ toJson(github.event.issue.labels.*.name) }}'
          OPTION_ID=""
          if echo "$LABELS" | grep -q '"priority/critical"'; then OPTION_ID="74334e8d"
          elif echo "$LABELS" | grep -q '"priority/high"'; then OPTION_ID="2e3ede9d"
          elif echo "$LABELS" | grep -q '"priority/medium"'; then OPTION_ID="7709e85d"
          elif echo "$LABELS" | grep -q '"priority/low"'; then OPTION_ID="2182b5f9"
          fi
          if [ -n "$OPTION_ID" ]; then
            gh project item-edit --project-id "$PROJECT_ID" --id "$ITEM_ID" \
              --field-id "$PRIORITY_FIELD" --single-select-option-id "$OPTION_ID"
          fi

      - name: Set Category field
        if: github.event_name == 'issues' && steps.add.outputs.itemId != ''
        env:
          PROJECT_ID: "PVT_kwDOCxeiOM4BR2KZ"
          CATEGORY_FIELD: "PVTSSF_lADOCxeiOM4BR2KZzg_jXxA"
        run: |
          LABELS='${{ toJson(github.event.issue.labels.*.name) }}'
          OPTION_ID=""
          if echo "$LABELS" | grep -q '"type/feature"'; then OPTION_ID="7a4fa8ea"
          elif echo "$LABELS" | grep -q '"type/bug"'; then OPTION_ID="206e624a"
          elif echo "$LABELS" | grep -q '"type/docs"'; then OPTION_ID="355ce6c1"
          elif echo "$LABELS" | grep -q '"type/infra"'; then OPTION_ID="05996f93"
          elif echo "$LABELS" | grep -q '"type/refactor"'; then OPTION_ID="7f5509ab"
          elif echo "$LABELS" | grep -q '"type/security"'; then OPTION_ID="d2af4749"
          fi
          if [ -n "$OPTION_ID" ]; then
            gh project item-edit --project-id "$PROJECT_ID" --id "$ITEM_ID" \
              --field-id "$CATEGORY_FIELD" --single-select-option-id "$OPTION_ID"
          fi
